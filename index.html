<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fénix · Generador</title>
<style>
  :root{
    --void-deep:#0a0620;
    --void-mid:#1a0f3d;
    --indigo:#2d1b5e;
    --violet:#4a2a8a;
    --gold:#f4c542;
    --gold-bright:#ffd966;
    --gold-dim:#8a6d2f;
    --ember:#ff8a3d;
    --ash:#c9bfe0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Georgia', 'Times New Roman', serif;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(255,138,61,0.08), transparent 45%),
      radial-gradient(ellipse at 80% 110%, rgba(244,197,66,0.06), transparent 50%),
      linear-gradient(180deg, var(--void-deep) 0%, var(--void-mid) 50%, var(--indigo) 100%);
    color:var(--ash);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }

  /* ambient particle canvas */
  #particles{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }

  header{
    position:relative; z-index:1;
    text-align:center;
    padding:28px 16px 18px;
  }
  header h1{
    font-family:'Trajan Pro','Cinzel','Georgia',serif;
    font-size:clamp(28px,6vw,42px);
    letter-spacing:0.12em;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--ember));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(244,197,66,0.25);
  }
  header p{
    margin-top:6px;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--ash);
    opacity:0.7;
    font-style:italic;
  }

  main{
    position:relative; z-index:1;
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:640px;
    width:100%;
    margin:0 auto;
    padding:0 14px 14px;
  }

  #chat{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:10px 4px 20px;
    min-height:200px;
  }

  .msg{
    max-width:85%;
    padding:14px 16px;
    border-radius:14px;
    font-size:15px;
    line-height:1.5;
    animation:rise 0.35s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg, var(--violet), var(--indigo));
    border:1px solid rgba(244,197,66,0.25);
    color:#f0ecff;
    border-bottom-right-radius:4px;
  }
  .msg.fenix{
    align-self:flex-start;
    background:rgba(20,12,45,0.6);
    border:1px solid rgba(244,197,66,0.15);
    border-bottom-left-radius:4px;
  }
  .msg.fenix .label{
    display:block;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:6px;
  }
  .msg img.attach{
    max-width:100%;
    border-radius:8px;
    margin-top:8px;
    border:1px solid rgba(244,197,66,0.2);
  }
  .msg a.result-link{
    color:var(--gold-bright);
    text-decoration:none;
    border-bottom:1px solid var(--gold-dim);
  }
  .msg.error{
    border-color:rgba(255,90,90,0.35);
    color:#ffb4b4;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    gap:5px;
    padding:14px 16px;
  }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--gold);
    animation:pulse 1.2s infinite ease-in-out;
    opacity:0.5;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{ 0%,100%{opacity:0.25; transform:scale(0.8);} 50%{opacity:1; transform:scale(1.15);} }

  #composer{
    position:relative; z-index:1;
    display:flex;
    align-items:flex-end;
    gap:8px;
    background:rgba(15,9,35,0.75);
    border:1px solid rgba(244,197,66,0.2);
    border-radius:18px;
    padding:8px 8px 8px 14px;
    backdrop-filter:blur(10px);
  }
  #image-preview-wrap{
    display:none;
    position:relative;
    padding:6px 6px 0 0;
  }
  #image-preview-wrap img{
    width:44px; height:44px; object-fit:cover;
    border-radius:8px;
    border:1px solid var(--gold-dim);
  }
  #image-preview-wrap button{
    position:absolute; top:-2px; right:-2px;
    width:16px; height:16px;
    border-radius:50%;
    background:#ff5a5a; color:white; border:none;
    font-size:10px; line-height:1;
    cursor:pointer;
  }
  #prompt{
    flex:1;
    background:none;
    border:none;
    outline:none;
    resize:none;
    color:#f0ecff;
    font-family:inherit;
    font-size:15px;
    max-height:120px;
    padding:8px 0;
  }
  #prompt::placeholder{color:rgba(201,191,224,0.4);}

  .icon-btn{
    flex-shrink:0;
    width:42px; height:42px;
    border-radius:50%;
    border:1px solid rgba(244,197,66,0.25);
    background:rgba(74,42,138,0.3);
    color:var(--gold);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.15s ease;
    font-size:18px;
  }
  .icon-btn:hover{background:rgba(74,42,138,0.55); transform:translateY(-1px);}
  .icon-btn:active{transform:scale(0.94);}

  #send-btn{
    background:linear-gradient(135deg, var(--gold-bright), var(--ember));
    border:none;
    color:var(--void-deep);
    font-weight:bold;
  }
  #send-btn:disabled{opacity:0.4; cursor:not-allowed;}

  footer{
    position:relative; z-index:1;
    text-align:center;
    font-size:11px;
    color:var(--gold-dim);
    letter-spacing:0.1em;
    padding:10px;
    opacity:0.6;
  }

  @media (prefers-reduced-motion: reduce){
    .msg, .typing span{animation:none !important;}
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <h1>FÉNIX</h1>
  <p>Dile qué página quieres. Ella la forja.</p>
</header>

<main>
  <div id="chat"></div>

  <div id="composer">
    <div
