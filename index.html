<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fénix · Generador</title>
<style>
  :root{
    --void-deep:#0a0620;
    --void-mid:#1a0f3d;
    --indigo:#2d1b5e;
    --violet:#4a2a8a;
    --gold:#f4c542;
    --gold-bright:#ffd966;
    --gold-dim:#8a6d2f;
    --ember:#ff8a3d;
    --ash:#c9bfe0;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:'Georgia', 'Times New Roman', serif;
    background:
      radial-gradient(ellipse at 20% -10%, rgba(255,138,61,0.08), transparent 45%),
      radial-gradient(ellipse at 80% 110%, rgba(244,197,66,0.06), transparent 50%),
      linear-gradient(180deg, var(--void-deep) 0%, var(--void-mid) 50%, var(--indigo) 100%);
    color:var(--ash);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow-x:hidden;
  }

  /* ambient particle canvas */
  #particles{
    position:fixed; inset:0; z-index:0; pointer-events:none;
  }

  header{
    position:relative; z-index:1;
    text-align:center;
    padding:28px 16px 18px;
  }
  header h1{
    font-family:'Trajan Pro','Cinzel','Georgia',serif;
    font-size:clamp(28px,6vw,42px);
    letter-spacing:0.12em;
    background:linear-gradient(180deg, var(--gold-bright), var(--gold) 55%, var(--ember));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 30px rgba(244,197,66,0.25);
  }
  header p{
    margin-top:6px;
    font-size:13px;
    letter-spacing:0.08em;
    color:var(--ash);
    opacity:0.7;
    font-style:italic;
  }

  main{
    position:relative; z-index:1;
    flex:1;
    display:flex;
    flex-direction:column;
    max-width:640px;
    width:100%;
    margin:0 auto;
    padding:0 14px 14px;
  }

  #chat{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:14px;
    padding:10px 4px 20px;
    min-height:200px;
  }

  .msg{
    max-width:85%;
    padding:14px 16px;
    border-radius:14px;
    font-size:15px;
    line-height:1.5;
    animation:rise 0.35s ease;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }

  .msg.user{
    align-self:flex-end;
    background:linear-gradient(135deg, var(--violet), var(--indigo));
    border:1px solid rgba(244,197,66,0.25);
    color:#f0ecff;
    border-bottom-right-radius:4px;
  }
  .msg.fenix{
    align-self:flex-start;
    background:rgba(20,12,45,0.6);
    border:1px solid rgba(244,197,66,0.15);
    border-bottom-left-radius:4px;
  }
  .msg.fenix .label{
    display:block;
    font-size:10px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gold-dim);
    margin-bottom:6px;
  }
  .msg img.attach{
    max-width:100%;
    border-radius:8px;
    margin-top:8px;
    border:1px solid rgba(244,197,66,0.2);
  }
  .msg a.result-link{
    color:var(--gold-bright);
    text-decoration:none;
    border-bottom:1px solid var(--gold-dim);
  }
  .msg.error{
    border-color:rgba(255,90,90,0.35);
    color:#ffb4b4;
  }
  .typing{
    align-self:flex-start;
    display:flex;
    gap:5px;
    padding:14px 16px;
  }
  .typing span{
    width:6px; height:6px; border-radius:50%;
    background:var(--gold);
    animation:pulse 1.2s infinite ease-in-out;
    opacity:0.5;
  }
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes pulse{ 0%,100%{opacity:0.25; transform:scale(0.8);} 50%{opacity:1; transform:scale(1.15);} }

  #composer{
    position:relative; z-index:1;
    display:flex;
    align-items:flex-end;
    gap:8px;
    background:rgba(15,9,35,0.75);
    border:1px solid rgba(244,197,66,0.2);
    border-radius:18px;
    padding:8px 8px 8px 14px;
    backdrop-filter:blur(10px);
  }
  #image-preview-wrap{
    display:none;
    position:relative;
    padding:6px 6px 0 0;
  }
  #image-preview-wrap img{
    width:44px; height:44px; object-fit:cover;
    border-radius:8px;
    border:1px solid var(--gold-dim);
  }
  #image-preview-wrap button{
    position:absolute; top:-2px; right:-2px;
    width:16px; height:16px;
    border-radius:50%;
    background:#ff5a5a; color:white; border:none;
    font-size:10px; line-height:1;
    cursor:pointer;
  }
  #prompt{
    flex:1;
    background:none;
    border:none;
    outline:none;
    resize:none;
    color:#f0ecff;
    font-family:inherit;
    font-size:15px;
    max-height:120px;
    padding:8px 0;
  }
  #prompt::placeholder{color:rgba(201,191,224,0.4);}

  .icon-btn{
    flex-shrink:0;
    width:42px; height:42px;
    border-radius:50%;
    border:1px solid rgba(244,197,66,0.25);
    background:rgba(74,42,138,0.3);
    color:var(--gold);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:transform 0.15s ease, background 0.15s ease;
    font-size:18px;
  }
  .icon-btn:hover{background:rgba(74,42,138,0.55); transform:translateY(-1px);}
  .icon-btn:active{transform:scale(0.94);}

  #send-btn{
    background:linear-gradient(135deg, var(--gold-bright), var(--ember));
    border:none;
    color:var(--void-deep);
    font-weight:bold;
  }
  #send-btn:disabled{opacity:0.4; cursor:not-allowed;}

  footer{
    position:relative; z-index:1;
    text-align:center;
    font-size:11px;
    color:var(--gold-dim);
    letter-spacing:0.1em;
    padding:10px;
    opacity:0.6;
  }

  @media (prefers-reduced-motion: reduce){
    .msg, .typing span{animation:none !important;}
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <h1>FÉNIX</h1>
  <p>Dile qué página quieres. Ella la forja.</p>
</header>

<main>
  <div id="chat"></div>

  <div id="composer">
    <div id="image-preview-wrap">
      <img id="image-preview" alt="adjunto">
      <button id="remove-image" title="Quitar imagen">×</button>
    </div>
    <input type="file" id="image-input" accept="image/*" style="display:none">
    <button class="icon-btn" id="image-btn" title="Añadir imagen">📎</button>
    <textarea id="prompt" placeholder="Ej: página para mi cafetería, tonos cálidos, menú y contacto..." rows="1"></textarea>
    <button class="icon-btn" id="send-btn" title="Generar">➤</button>
  </div>
</main>

<footer>hecho con La Forja</footer>

<script>
/* ============================================================
   CONFIGURACIÓN — RELLENA ESTO ANTES DE PUBLICAR
   ============================================================
   1. Entra a tu Space: https://huggingface.co/spaces/Cristobal299/Fenix-fabfica
   2. Abajo del todo (o en el botón "Use via API") verás la URL base
      y el nombre exacto de la función (api_name) que genera la página.
      Suele verse como: /run/predict o /call/nombre_funcion
   3. Pon aquí ese nombre exacto. Si tu función se llama distinto,
      cámbialo — si no, la llamada fallará.
============================================================ */
const SPACE_URL = "https://cristobal299-generador-gratis.hf.space"; // ← el Space nuevo, público, sin login
const API_NAME  = "/generar_web"; // ← coincide con api_name="/generar_web" en app.py

const chat = document.getElementById('chat');
const promptInput = document.getElementById('prompt');
const sendBtn = document.getElementById('send-btn');
const imageBtn = document.getElementById('image-btn');
const imageInput = document.getElementById('image-input');
const previewWrap = document.getElementById('image-preview-wrap');
const previewImg = document.getElementById('image-preview');
const removeImageBtn = document.getElementById('remove-image');

let attachedImageBase64 = null;

// auto-resize textarea
promptInput.addEventListener('input', () => {
  promptInput.style.height = 'auto';
  promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + 'px';
});

imageBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', () => {
  const file = imageInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    attachedImageBase64 = reader.result; // data:image/...;base64,....
    previewImg.src = attachedImageBase64;
    previewWrap.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

removeImageBtn.addEventListener('click', () => {
  attachedImageBase64 = null;
  imageInput.value = '';
  previewWrap.style.display = 'none';
});

function addMessage(text, role, opts = {}) {
  const div = document.createElement('div');
  div.className = 'msg ' + role + (opts.error ? ' error' : '');
  if (role === 'fenix') {
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = opts.error ? 'error' : 'fénix';
    div.appendChild(label);
  }
  const p = document.createElement('div');
  p.innerHTML = text;
  div.appendChild(p);
  if (opts.imageSrc) {
    const img = document.createElement('img');
    img.className = 'attach';
    img.src = opts.imageSrc;
    div.appendChild(img);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function subirImagenAGradio(dataUrl) {
  // Convierte el data-URL a Blob y lo sube al endpoint /upload de Gradio,
  // que devuelve una ruta temporal que luego se referencia en el predict.
  const resBlob = await (await fetch(dataUrl)).blob();
  const form = new FormData();
  form.append('files', resBlob, 'imagen.jpg');

  const uploadResp = await fetch(SPACE_URL + '/gradio_api/upload', {
    method: 'POST',
    body: form
  });
  if (!uploadResp.ok) throw new Error('No se pudo subir la imagen (HTTP ' + uploadResp.status + ')');
  const paths = await uploadResp.json(); // ["ruta/temporal/imagen.jpg"]
  return {
    path: paths[0],
    url: null,
    size: resBlob.size,
    orig_name: 'imagen.jpg',
    mime_type: resBlob.type || 'image/jpeg',
    meta: { _type: 'gradio.FileData' }
  };
}

async function sendToForja(promptText, imageBase64) {
  let imagePayload = null;
  if (imageBase64) {
    imagePayload = await subirImagenAGradio(imageBase64);
  }
  // Paso 1: iniciar la llamada (Gradio API pattern usado en tus otros pipelines)
  const payload = { data: [promptText, imagePayload] };

  const startResp = await fetch(SPACE_URL + '/gradio_api/call' + API_NAME, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!startResp.ok) {
    throw new Error('No se pudo iniciar la generación (HTTP ' + startResp.status + ')');
  }

  const { event_id } = await startResp.json();

  // Paso 2: escuchar el resultado vía SSE
  const eventResp = await fetch(SPACE_URL + '/gradio_api/call' + API_NAME + '/' + event_id);
  const reader = eventResp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (line.startsWith('data:')) {
        const jsonStr = line.slice(5).trim();
        if (!jsonStr) continue;
        try {
          const parsed = JSON.parse(jsonStr);
          return parsed; // primer resultado útil
        } catch (e) {
          // línea de control, ignorar
        }
      }
    }
  }
  throw new Error('El stream terminó sin devolver resultado');
}

async function handleSend() {
  const text = promptInput.value.trim();
  if (!text) return;

  addMessage(text, 'user', attachedImageBase64 ? { imageSrc: attachedImageBase64 } : {});
  const imgToSend = attachedImageBase64;

  promptInput.value = '';
  promptInput.style.height = 'auto';
  attachedImageBase64 = null;
  imageInput.value = '';
  previewWrap.style.display = 'none';
  sendBtn.disabled = true;

  showTyping();
  try {
    const result = await sendToForja(text, imgToSend);
    hideTyping();

    // generar_web devuelve un único texto (Textbox) con la URL incrustada.
    const texto = Array.isArray(result) ? String(result[0] ?? '') : String(result);
    const match = texto.match(/https?:\/\/\S+/);
    let html = texto.replace(/\n/g, '<br>');
    if (match) {
      html = html.replace(match[0], '<a class="result-link" href="' + match[0] + '" target="_blank">' + match[0] + '</a>');
    }
    addMessage(html, 'fenix', { error: texto.startsWith('❌') || texto.startsWith('⚠️') || texto.startsWith('🙏') });
  } catch (err) {
    hideTyping();
    addMessage('Algo falló: ' + err.message + '. Revisa SPACE_URL y API_NAME en el código, o que el Space esté despierto.', 'fenix', { error: true });
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', handleSend);
promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// mensaje de bienvenida
addMessage('Cuéntame qué página quieres — para qué negocio es, el estilo, y si tienes una imagen de referencia, adjúntala.', 'fenix');

/* ============================================================
   Fondo ambiental: humo/partículas doradas flotando
============================================================ */
(function () {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function makeParticles(n) {
    return Array.from({ length: n }, () => ({
      x: Math.random() * w,
      y: h + Math.random() * h,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.4 + 0.15,
      drift: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.5 + 0.15
    }));
  }
  particles = makeParticles(60);

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(244,197,66,${p.alpha})`;
      ctx.shadowColor = 'rgba(255,180,80,0.8)';
      ctx.shadowBlur = 4;
      ctx.fill();
      p.y -= p.speed;
      p.x += p.drift;
      if (p.y < -10) {
        p.y = h + 10;
        p.x = Math.random() * w;
      }
    }
    requestAnimationFrame(draw);
  }
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    draw();
  }
})();
</script>
</body>
</html>
